instantiate_model: true
modality_tag: path
modality_dir_name: pathology
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true
qa_parquet_path: ${project.root_dir}/data/proj_train/pathology/path_proj_train_qa.parquet
# UNI2 patch embeddings are 1536-dim after conversion to the CONCH-like H5 layout.
pathology_embedding_dim: 1536

# Path projector preset A: simple MLP baseline
# projector_type: mlp
# projector_dropout: 0.05

# Path projector preset B: Perceiver-style resampler
projector_type: resampler
projector_num_latents: 256
projector_depth: 2
projector_num_heads: 8
projector_mlp_ratio: 4.0
projector_dropout: 0.1
allowed_slide_kinds:
  - DX
batch_size: 1
num_epochs: 10
learning_rate: 5e-5
weight_decay: 0.01
gradient_accumulation_steps: 32
grad_clip_norm: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
warmup_steps:
# Applied after optional on-the-fly patch compression.
max_patch_tokens: 9012
# On-the-fly patch compression before max_patch_tokens:
# - none: keep raw patch sequence
# - mean_pool: average nearby 2D patches within local windows
# - stride: keep one representative patch per local window
patch_compression_method: none
# Spatial window width/height in patch-grid units. 2 means 2x2 local windows.
patch_compression_kernel_size: 2
patch_token_dropout_prob: 0.10
max_text_length: 1024
dataloader_num_workers: 0
device: cuda:0
load_in_8bit: true
torch_dtype: bfloat16
autocast_dtype: float16
projector_dtype: float32
attn_implementation:
gradient_checkpointing: true
seed: 42
max_train_samples:
validation_fraction: 0.05
always_frozen_prefixes:
  - pathology
  - radiology
  - segmentation
projector_prefixes:
  - projector
  - projectors
output_dir: ${project.root_dir}/outputs/projectors
save_tokenizer_snapshot: false
wandb:
  enabled: true
  project: kidney-vlm
  entity:
  run_name: path_projector_stage1_qwen3_9b
  mode: online
  tags:
    - path_projector
    - pathology
    - qwen
