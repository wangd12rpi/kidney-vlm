instantiate_model: true
modality_tag: radiology
modality_dir_name: radiology
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true
qa_parquet_path: ${project.root_dir}/data/proj_train/radiology/radiology_proj_train_qa.parquet
radiology_embedding_dim: 1152

# Radiology projector baseline
projector_type: mlp
projector_num_latents: 64
projector_depth: 2
projector_num_heads: 8
projector_mlp_ratio: 4.0
projector_dropout: 0.05

batch_size: 8
num_epochs: 10
learning_rate: 5e-5
weight_decay: 0.01
gradient_accumulation_steps: 8
grad_clip_norm: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
warmup_steps:
max_slice_tokens: 32
slice_token_dropout_prob: 0.10
max_text_length: 512
dataloader_num_workers: 0
device: cuda:0
load_in_8bit: true
torch_dtype: bfloat16
autocast_dtype: float16
projector_dtype: float32
attn_implementation:
gradient_checkpointing: true
seed: 42
max_train_samples:
always_frozen_prefixes:
  - pathology
  - radiology
  - segmentation
  - dnam
projector_prefixes:
  - projector
  - projectors
output_dir: ${project.root_dir}/outputs/projectors
save_tokenizer_snapshot: false
