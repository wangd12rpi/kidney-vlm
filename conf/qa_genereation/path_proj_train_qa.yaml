task: path_proj_train_qa

# I/O
source_registry_path: ${data.unified_registry_path}
caption_parquet_path: ${project.root_dir}/data/path_proj_train/path_case_captions.parquet
output_parquet_path: ${project.root_dir}/data/path_proj_train/path_proj_train_qa.parquet
overwrite_output: false

# Selection/debug
require_pathology: false
# Empty means include all projects.
allowed_project_ids: []
require_patch_embeddings: true
require_existing_patch_embedding_files: true
exclude_normal_tcga_slides: true
patch_count_lower_quantile: 0.05
patch_count_upper_quantile: 0.95
# Limits the number of slide rows after case-to-slide expansion for quick debugging.
first_n:
print_first_n: 2

# Training-sample defaults
instruction: "Describe the pathology image."
