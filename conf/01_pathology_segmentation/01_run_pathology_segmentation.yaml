name: pathology_sampath_segmentation_bcss
method_name: sampath
registry_path: ${data.unified_registry_path}
output_root: ${project.root_dir}/data/pathology_segmentation
mask_dir: ${pathology_segmentation.output_root}/masks_${pathology_segmentation.target_magnification}x
slide_image_dir: ${pathology_segmentation.output_root}/slides_${pathology_segmentation.target_magnification}x
overlay_dir: ${pathology_segmentation.output_root}/overlays_${pathology_segmentation.target_magnification}x
metadata_dir: ${pathology_segmentation.output_root}/metadata_${pathology_segmentation.target_magnification}x
sampath_root: ${project.root_dir}/external/SAMPath
sampath_python_executable: ${project.root_dir}/.venv/bin/python
sampath_config_module: configs.BCSS
sampath_pretrained_path: ${pathology_segmentation.sampath_root}/model.ckpt
sampath_devices: "0"
allowed_project_ids:
  - TCGA-BRCA
allowed_slide_kinds:
  - DX
top_k_slides:
resumable: true
skip_errors: false
file_metadata_chunk_size: 200
temp_download_root: ${data.staging_root}/pathology_segmentation_downloads
# Render/save the slide image before running SAMPath on that rendered view.
target_magnification: 2.5
max_rendered_slide_side: 2048
save_slide_image: true
save_overlay_image: true
save_metadata_json: true
class_palette_rgb:
  - [0, 0, 0]
  - [255, 70, 70]
  - [70, 160, 255]
  - [80, 200, 120]
  - [255, 200, 70]
  - [180, 90, 255]
overlay_alpha: 0.40
show_plots: false
max_plots_to_show: 3
