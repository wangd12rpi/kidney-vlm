data:
  source:
    name: pmc_oa
    download:
      enabled: false
    pmc_oa:
      project_id: pmc_oa
      split_scheme_version: pmc_oa_explicit_image_split_v1
      image_root_dir: ${project.root_dir}/data/raw/pmc_oa/images
      train_jsonl_path: ${project.root_dir}/data/raw/pmc_oa/train.jsonl
      validation_jsonl_path: ${project.root_dir}/data/raw/pmc_oa/valid.jsonl
      test_jsonl_path: ${project.root_dir}/data/raw/pmc_oa/test.jsonl
      feature_store_path: ${project.root_dir}/data/processes/pmc_oa/pmc_oa_features.h5
      feature_index_path: ${project.root_dir}/data/processes/pmc_oa/pmc_oa_feature_index.parquet
      rebuild_feature_index: false
      require_existing_image_files: false
      fail_on_missing_features: true
      instruction: "Describe the radiology image."
      caption_model: pmc_oa_human
