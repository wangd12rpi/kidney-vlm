data:
  source:
    name: tcga
    download:
      enabled: false
      skip_existing: true
      include:
        pathology: false
        radiology: false
        reports: true
      max_pathology_downloads:
      max_report_downloads:
      max_radiology_series_downloads:
      max_series_per_study:
    tcga:
      exclude_project_ids: []
      upsert_mode: replace
      radiology_process_root: ${project.root_dir}/data/processes/radiology
      patient_subset_ids: []
      patient_chunk:
        index: 0
        size:
      split_ratios:
        train: 0.9
        test: 0.1
      gdc:
        base_url: https://api.gdc.cancer.gov
        timeout_seconds: 120
        page_size: 1000
        max_retries: 3
        retry_backoff_seconds: 2.0
        max_cases:
        max_pathology_files:
        max_report_files:
        fetch_ssm_mutations: true
        max_ssm_hits:
        mutation_gene_panel:
          - VHL
          - PBRM1
          - BAP1
          - SETD2
          - KDM5C
          - MTOR
          - TP53
          - PTEN
          - TSC1
          - TSC2
          - FH
          - MET
          - FLCN
          - PIK3CA
          - ARID1A
        pathology_data_formats:
          - SVS
        pathology_data_types:
          - Slide Image
        report_data_formats:
          - PDF
        report_data_types:
          - Pathology Report
          - Clinical Supplement
        report_data_categories:
          - Clinical
      genomics:
        enabled: true
        download_raw: true
        build_text_from_pancan: true
        skip_existing: true
        cleanup_temp_cache: false
        write_download_manifest: true
        download_manifest_jsonl_path: ${data.staging_root}/tcga_genomics_downloads.jsonl
        raw_payloads:
          masked_somatic_mutation: true
          gene_expression_quantification: true
          copy_number_segments: true
          masked_copy_number_segments: true
          gene_level_copy_number: true
          mirna_expression_quantification: true
          clinical_supplement: true
          biospecimen_supplement: true
          msisensor_scores: true
          methylation_beta_value: true
        timeout_seconds: 300
        pancan_cache_dir: ${data.raw_root}/tcga/genomics/pancan
        write_jsonl_sidecar: true
        sidecar_jsonl_path: ${data.staging_root}/tcga_genomics.jsonl
        write_text_files: true
        text_output_dir: ${data.staging_root}/tcga_genomics_text
      tcia:
        enabled: true
        restrict_to_radiology_cases: true
        base_url: https://services.cancerimagingarchive.net/nbia-api/services
        api_version: v1
        timeout_seconds: 120
        max_retries: 3
        retry_backoff_seconds: 2.0
        fetch_series_metadata: true
        collections: []
        qualifying_modalities:
          - CT
          - MR
        max_studies_per_collection:
        max_series_per_study_metadata:
        qc:
          enabled: true
          min_rows: 64
          min_cols: 64
          min_usable_images: 5
          max_rejected_fraction_for_series: 0.5
          reject_multiframe_series: true
          reject_derived_series: false
          decode_pixels: false
          force_read: true
          keep_rejected_extracted_series: false
          detail_root: ${data.staging_root}/tcga_radiology_qc
          report_jsonl_path: ${data.staging_root}/tcga_radiology_qc.jsonl
        feature_extraction:
          enabled: true
          model_name: google/medsiglip-448
          input_size: 448
          batch_size: 16
          device: cuda
          png_render_mode: ct_rgb_multiwindow
          prefer_dicom_voi: false
          apply_padding_mask: true
          png_resize:
          png_root:
          feature_store_path:
          overwrite_pngs: false
          skip_existing_features: true
        segmentation:
          enabled: false
          keyword_map_path: ${project.root_dir}/conf/data/tcga_medsam3_keywords.yaml
          medical_sam3_root: ${project.root_dir}/external/Medical-SAM3
          sam3_root: ${project.root_dir}/external/sam3
          checkpoint_path: ${project.root_dir}/external/Medical-SAM3/checkpoints/checkpoint.pt
          input_size: ${data.source.tcga.tcia.feature_extraction.input_size}
          device: cuda
          confidence_threshold: 0.1
          min_mask_pixels: 16
          png_render_mode: ${data.source.tcga.tcia.feature_extraction.png_render_mode}
          prefer_dicom_voi: ${data.source.tcga.tcia.feature_extraction.prefer_dicom_voi}
          apply_padding_mask: ${data.source.tcga.tcia.feature_extraction.apply_padding_mask}
          png_resize: ${data.source.tcga.tcia.feature_extraction.png_resize}
          png_root:
          mask_root:
          overwrite_pngs: false
          overwrite_masks: false
          skip_existing_masks: true
        cleanup:
          enabled: true
          delete_series_zip_files: true
          delete_source_dicom_files: true
          prune_empty_directories: true
