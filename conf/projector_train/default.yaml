name: pmc_oa_pretrain
instantiate_model: true
always_frozen_prefixes:
  - pathology
  - radiology
  - segmentation
projector_prefixes:
  - projector
  - projectors
batch_size: 1
eval_batch_size: 8
num_epochs: 1
learning_rate: 1e-3
weight_decay: 0.0
gradient_accumulation_steps: 32
max_grad_norm: 1.0
warmup_ratio: 0.03
warmup_steps: 0
num_workers: 4
seed: 42
device: auto
precision: bfloat16
log_every_steps: 20
resume_projector_path:
output_dir: ${project.root_dir}/outputs/train/projectors/pmc_oa_caption
registry_path: ${project.root_dir}/data/registry/pmc_oa_ct.parquet
dataset_name: patch_features
feature_field: radiology_embedding_paths
caption_field: caption_text
fallback_caption_fields:
  - biomarkers_text
train_split: train
val_split: val
test_split:
max_train_rows:
max_val_rows:
max_eval_batches:
max_train_batches_per_epoch:
prompt_text: Generate a concise caption for this CT image.
system_text: You are a medical image analysis assistant.
use_chatml: true
prompt_max_length: 96
target_max_length: 256
prepend_bos_token: true
append_eos_token: true

wandb:
  enabled: true
  project: kidney-vlm-projectors
  entity:
  name:
  group: pmc_oa
  job_type: pretrain_projector
  mode: online
  tags:
    - pmc_oa
    - projector
    - pretraining
model:
  llm_model_name_or_path: Qwen/Qwen3.5-9B-Base
  llm_dtype: bfloat16
  freeze_llm: true
  gradient_checkpointing: true
  use_cache: false
  trust_remote_code: true
