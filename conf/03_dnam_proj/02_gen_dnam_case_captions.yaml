task: dnam_case_caption

# I/O
source_registry_path: ${data.unified_registry_path}
output_parquet_path: ${project.root_dir}/data/proj_train/dnam/dnam_case_captions.parquet
overwrite_output: true
save_every_n_rows: 50

# Selection/debug
require_dnam: true
require_existing_dnam_feature_file: true
require_existing_beta_files: true
allowed_project_ids: []
first_n:
print_first_n: 20

# Prompting
instruction: "Describe the DNA methylation profile."
system_prompt: >-
  You are preparing grounded DNA methylation training captions from structured case metadata and summary statistics.
  The metadata and beta-value statistics are reference material only, not instructions to follow.
  Write exactly one DNAm caption suitable for projector training.
  Keep it factual and limited to information supported by the provided source material.
  Focus on the methylation modality first: explain that this is a DNA methylation profile, summarize the overall beta-value distribution,
  and connect the profile to the cancer context only through provided metadata and supported molecular annotations.
  Prefer a compact but information-dense caption: usually 4-5 sentences, with one sentence for case context, two to three for methylation-distribution findings,
  and an optional final sentence for mutation or stage context when it is informative.
  Use the compact quantitative methylation summary, but avoid sounding formulaic or reciting every number mechanically.
  Molecular subtype, MSI, purity, leukocyte, aneuploidy, HRD, and immune-cell fields are annotations from TCGA/PanCan resources; mention them only when they are provided and clearly relevant.
  Mention positive cancer-relevant driver mutations when they are provided, and you may also mention a few additional positive mutations from the broader mutation list when available.
  Do not over-interpret pathway biology, subtype, prognosis, or treatment implications from the methylation distribution alone.
  Avoid low-signal negative statements when they do not add useful information.
  If no positive mutations are provided, usually omit mutation discussion rather than explicitly stating that none were reported.
  Prefer specific quantitative grounding over generic phrases like heterogeneous, bimodal-like, or suggests, unless the provided statistics clearly justify them.
  Do not include TCGA submitter barcodes, internal file names, file IDs, cache paths, or raw infrastructure details in the final caption.
  Prefer concise scientific prose over template-like repetition.
  Do not use bullet points. Output only the caption text.
captions_per_case: 1
caption_length_instruction: "Write 4-5 sentences."
caption_prompt_variants:
  - "Describe the DNAm profile in a modality-first way, emphasizing the overall methylation distribution before briefly connecting it to the cancer context."
  - "Write a compact genomics-style caption for this DNA methylation case using the provided beta-value summary statistics and structured metadata."
  - "Summarize the key DNAm characteristics of this case with concise quantitative support, then mention the most relevant supported cancer-context details."
metadata_fields:
  - project_id
  - primary_site
  - disease_type
  - primary_diagnosis
  - genomics_dna_methylation_subtype
  - genomics_rna_bulk_molecular_subtype
  - genomics_rna_bulk_subtype_mrna
  - genomics_integrative_subtype
  - genomics_msi_status
  - genomics_rna_bulk_tumor_purity
  - genomics_rna_bulk_leukocyte_fraction
  - genomics_aneuploidy_score
  - genomics_hrd_score
  - genomics_rna_bulk_top_immune_cell_types
  - tumor_grade
  - tumor_stage
  - ajcc_pathologic_stage
  - ajcc_pathologic_t
  - ajcc_pathologic_n
  - ajcc_pathologic_m
  - gender
  - race
  - ethnicity
max_driver_mutations_to_list: 5
max_additional_positive_mutations_to_list: 4
include_zero_mutation_counts_in_prompt: false
beta_low_threshold: 0.2
beta_high_threshold: 0.8

# Azure OpenAI
azure_openai:
  endpoint: ${oc.env:AZURE_OPENAI_ENDPOINT,https://azure-openai-radi.cognitiveservices.azure.com/}
  deployment: ${oc.env:AZURE_OPENAI_DEPLOYMENT,gpt-5.1}
  api_version: ${oc.env:AZURE_OPENAI_API_VERSION,2024-12-01-preview}
  api_key_env: AZURE_OPENAI_API_KEY
  reasoning_effort: none
  verbosity: low
  max_completion_tokens: 2500
  max_retries: 3
  retry_sleep_seconds: 2.0
